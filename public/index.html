<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <title>Leury Brand</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    .bg-glow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.15), transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 24px;
      padding: 48px 40px;
      width: 360px;
      text-align: center;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 60px rgba(99,102,241,0.1);
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 800;
      color: white;
      margin: 0 auto 20px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 6px;
    }

    .role {
      font-size: 0.85rem;
      color: #6366f1;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-radius: 12px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #fff;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .link-btn:hover {
      background: #6366f1;
      border-color: #6366f1;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(99,102,241,0.3);
    }

    .link-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .footer {
      margin-top: 28px;
      font-size: 0.75rem;
      color: #444;
    }
  </style>
</head>
